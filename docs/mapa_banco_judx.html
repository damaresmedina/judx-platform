const root = document.getElementById('root');
let openCard = null;

Object.entries(data).forEach(([section, tables]) => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-title">${section}</div>`;
  const grid = document.createElement('div');
  grid.className = 'grid';

  tables.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card';
    const rowsBadge = t.rows > 0
      ? `<span class="badge badge-rows">${t.rows.toLocaleString('pt-BR')} rows</span>`
      : `<span class="badge badge-empty">vazia</span>`;
    const rlsBadge = t.rls ? `<span class="badge badge-rls">RLS</span>` : '';
    const colCount = t.cols.length > 0 ? `${t.cols.length} colunas` : '';

    card.innerHTML = `
      <div class="card-name">${t.name}</div>
      <div class="card-meta">${rowsBadge}${rlsBadge}</div>
      ${colCount ? `<div class="card-cols">${colCount}</div>` : ''}
      ${t.cols.length > 0 ? `<div class="detail" id="d-${t.name}">
        ${t.cols.map(c => `<div class="col-row">
          <span class="col-name">${c[0]}</span>
          <span class="col-type">${c[1]}</span>
          ${c[2] ? `<span class="col-flags">${c[2]}</span>` : ''}
        </div>`).join('')}
      </div>` : ''}
    `;

    if (t.cols.length > 0) {
      card.addEventListener('click', () => {
        const det = card.querySelector('.detail');
        if (!det) return;
        const wasOpen = det.classList.contains('open');
        if (openCard && openCard !== det) openCard.classList.remove('open');
        det.classList.toggle('open', !wasOpen);
        openCard = wasOpen ? null : det;
      });
    }

    grid.appendChild(card);
  });

  sec.appendChild(grid);
  root.appendChild(sec);
});
